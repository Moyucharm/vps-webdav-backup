# ============================================
# VPS WebDAV Backup Configuration
# ============================================
# Copy this file to /etc/vps-webdav-backup.conf
# and fill in your values.
#

# --------------------------------------------
# WebDAV Configuration (Required)
# --------------------------------------------
# Your WebDAV server URL (with or without trailing slash)
WEBDAV_URL="https://your-webdav-server.com"

# WebDAV authentication
WEBDAV_USER="your_username"
WEBDAV_PASS="your_password_or_token"

# Remote storage directory (must start with /)
# This directory will be created automatically if not exists
WEBDAV_PATH="/your-backup-folder"

# --------------------------------------------
# Backup Rotation
# --------------------------------------------
# Number of backups to keep on WebDAV
# Older backups will be automatically deleted
KEEP_COUNT=3

# --------------------------------------------
# Directories to Backup
# --------------------------------------------
# List of directories to backup (e.g., Docker Compose projects)
# Each directory will be copied recursively
# Format: "/path/to/directory"
BACKUP_DIRS=(
    "/home/user/apps/project1"
    "/home/user/apps/project2"
    "/home/user/develop/project3"
)

# --------------------------------------------
# Extra Files to Backup
# --------------------------------------------
# Additional individual files or directories to backup
# Format: "/path/to/file" or "/path/to/directory"
EXTRA_FILES=(
    "/etc/caddy/Caddyfile"
    "/etc/nginx/nginx.conf"
    "/etc/nginx/sites-available"
)

# --------------------------------------------
# Exclude Patterns
# --------------------------------------------
# Patterns to exclude from backup (rsync style)
# These patterns apply to all directories in BACKUP_DIRS
EXCLUDE_PATTERNS=(
    ".git"
    "node_modules"
    "*.log"
    "__pycache__"
    ".env.local"
    "*.tmp"
    ".cache"
    "venv"
    ".venv"
)

# --------------------------------------------
# Advanced Settings
# --------------------------------------------
# Temporary directory for creating backup archive
# Ensure this directory has enough disk space
TMP_DIR="/tmp"